<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - Productivity Detox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/css/main.css">
    <style>
        .nav-link.active {
            color: #3b82f6;
            font-weight: bold;
            background-color: #eff6ff; /* blue-50 */
        }
        .badge-card {
            background-color: #e0e7ff;
            color: #4338ca;
            padding: 10px 15px;
            border-radius: 12px;
            text-align: center;
        }
        .badge-card h4 {
            font-weight: bold;
            font-size: 14px;
        }
        .badge-card p {
            font-size: 12px;
            color: #4f46e5;
            margin-top: 4px;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 via-white to-purple-50 text-gray-800 min-h-screen font-sans">
    
    <!-- Sidebar -->
    <div class="fixed left-0 top-0 h-full w-64 bg-white shadow-lg p-5 z-50 overflow-y-auto">
        <h2 class="text-xl font-bold mb-6 text-blue-600 flex items-center gap-2">
            <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            Productivity App
        </h2>
        <ul class="space-y-4">
            <li><a href="dashboard.html" class="nav-link block p-3 rounded-lg text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition">Dashboard</a></li>
            <li><a href="tasks.html" class="nav-link block p-3 rounded-lg text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition">Tasks</a></li>
            <li><a href="analytics.html" class="nav-link active block p-3 rounded-lg text-gray-700 transition">Analytics</a></li>
        </ul>
        <div class="mt-8">
            <button id="logout-btn" class="w-full bg-white border-2 border-gray-200 hover:border-red-400 hover:text-red-500 hover:bg-red-50 text-gray-600 px-5 py-2 rounded-xl font-bold transition-all duration-300 shadow-sm" style="display:none;">Logout</button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="ml-64 p-4 lg:p-8 space-y-6">
        
        <!-- Header -->
        <div class="flex justify-between items-center bg-white/80 backdrop-blur-md p-4 rounded-2xl shadow-md border border-gray-100">
            <h1 class="text-2xl font-bold text-gray-700">Analytics & Insights</h1>
        </div>

        <!-- Charts -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white rounded-2xl border border-gray-100 shadow-md p-6 hover:shadow-xl transition-all duration-300">
                <h3 class="text-center font-bold mb-6 text-sm text-gray-500 uppercase flex items-center justify-center gap-2">
                    <span class="w-3 h-3 rounded-full bg-blue-500"></span> Weekly Focus
                </h3>
                <div class="relative h-56 w-full">
                    <canvas id="chart-weekly"></canvas>
                </div>
            </div>
            <div class="bg-white rounded-2xl border border-gray-100 shadow-md p-6 hover:shadow-xl transition-all duration-300">
                <h3 class="text-center font-bold mb-6 text-sm text-gray-500 uppercase flex items-center justify-center gap-2">
                    <span class="w-3 h-3 rounded-full bg-indigo-500"></span> Points Growth
                </h3>
                <div class="relative h-56 w-full">
                    <canvas id="chart-points"></canvas>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Weekly Report -->
            <div id="weeklyReportBox" class="bg-white shadow-md border border-gray-100 rounded-2xl p-6 hover:shadow-xl transition-all duration-300">
                <h3 class="text-xl font-bold mb-5 flex items-center gap-3 text-gray-700">
                    <span class="p-2.5 bg-blue-100 rounded-xl text-blue-600">📊</span>
                    Weekly Report
                </h3>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-gray-50 p-4 rounded-xl border border-gray-100 text-center">
                        <p class="text-xs text-gray-400 font-bold uppercase mb-1">Total Focus</p>
                        <p id="weeklyTotal" class="text-lg font-bold text-blue-600">0 min</p>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-xl border border-gray-100 text-center">
                        <p class="text-xs text-gray-400 font-bold uppercase mb-1">Best Day</p>
                        <p id="weeklyBest" class="text-sm font-bold text-indigo-600 truncate">-</p>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-xl border border-gray-100 text-center">
                        <p class="text-xs text-gray-400 font-bold uppercase mb-1">Avg Score</p>
                        <p id="weeklyAvg" class="text-lg font-bold text-green-500">0%</p>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-xl border border-gray-100 text-center">
                        <p class="text-xs text-gray-400 font-bold uppercase mb-1">Active Days</p>
                        <p id="weeklyStreak" class="text-lg font-bold text-orange-500">0 / 7</p>
                    </div>
                </div>
            </div>

            <!-- Achievements -->
            <div class="bg-white p-4 rounded-xl shadow-sm mt-4">
              <h2 class="text-lg font-semibold mb-3">🏆 Achievements</h2>
              <div id="badgeContainer" class="flex flex-wrap gap-2"></div>
            </div>
        </div>

    </div>

    <!-- Achievement Popup handled dynamically by JS now -->

    <script src="/js/app.js"></script>
</body>
</html>
