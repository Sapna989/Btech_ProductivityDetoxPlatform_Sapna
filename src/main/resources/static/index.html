<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity Detox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/main.css">
    <style>
        .circle-blur { position: absolute; filter: blur(80px); opacity: 0.5; z-index: 0; }
    </style>
</head>
<body class="bg-white text-gray-800 min-h-screen font-sans overflow-x-hidden relative">

    <div class="min-h-screen grid grid-cols-1 md:grid-cols-2 relative z-10">

        <!-- LEFT PANEL (BRANDING) -->
        <div class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 flex flex-col justify-center items-center text-white p-10 relative overflow-hidden hidden md:flex">
            <!-- Background Enhancements -->
            <div class="w-64 h-64 bg-white rounded-full circle-blur -top-10 -left-10"></div>
            <div class="w-80 h-80 bg-blue-400 rounded-full circle-blur -bottom-20 -right-20"></div>

            <h1 class="text-4xl font-bold mb-4 relative z-10 text-center">
              Stay Focused 🚀
            </h1>
            <p class="text-lg opacity-90 text-center relative z-10 max-w-md">
              Track your productivity, build habits, and achieve your goals.
            </p>
        </div>

        <!-- RIGHT PANEL (FORM) -->
        <div class="flex items-center justify-center bg-gray-50 relative">
            <div class="w-full max-w-md p-8 relative z-10">

                <!-- Login Form -->
                <form id="login-form">
                    <div class="bg-white rounded-2xl shadow-xl p-8 hover:shadow-2xl transition-all duration-300">
                        <h2 class="text-2xl font-bold text-center mb-6 text-gray-700">
                            Welcome Back 👋
                        </h2>

                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-600 mb-1">Email</label>
                                <input type="email" id="login-email" required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none transition-all">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-600 mb-1">Password</label>
                                <input type="password" id="login-password" required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none transition-all">
                            </div>
                            <p id="login-error" class="text-red-500 text-sm hidden font-medium text-center"></p>
                            <button type="submit" class="w-full bg-gradient-to-r from-indigo-500 to-purple-500 text-white font-bold py-3 mt-2 rounded-lg shadow-lg hover:scale-105 transition-all duration-300">Login</button>
                        </div>
                        
                        <p class="text-sm text-center mt-6 text-gray-500">
                            Don’t have an account? 
                            <a href="#" id="show-register" class="text-indigo-500 font-semibold hover:underline transition-all">Sign up</a>
                        </p>
                    </div>
                </form>

                <!-- Register Form (Hidden by default) -->
                <form id="register-form" class="hidden">
                    <div class="bg-white rounded-2xl shadow-xl p-8 hover:shadow-2xl transition-all duration-300">
                        <h2 class="text-2xl font-bold text-center mb-6 text-gray-700">
                            Create Account ✨
                        </h2>

                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-600 mb-1">Name</label>
                                <input type="text" id="register-name" required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none transition-all">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-600 mb-1">Email</label>
                                <input type="email" id="register-email" required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none transition-all">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-600 mb-1">Password</label>
                                <input type="password" id="register-password" required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none transition-all">
                            </div>
                            <p id="register-error" class="text-red-500 text-sm hidden font-medium text-center"></p>
                            <button type="submit" class="w-full bg-gradient-to-r from-indigo-500 to-purple-500 text-white font-bold py-3 mt-2 rounded-lg shadow-lg hover:scale-105 transition-all duration-300">Register</button>
                        </div>
                        
                        <p class="text-sm text-center mt-6 text-gray-500">
                            Already have an account? 
                            <a href="#" id="show-login" class="text-indigo-500 font-semibold hover:underline transition-all">Login</a>
                        </p>
                    </div>
                </form>

            </div>
        </div>

    </div>

    <script src="/js/auth.js"></script>
</body>
</html>
